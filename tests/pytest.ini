[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 添加标记
markers =
    asyncio: 异步测试
    slow: 慢速测试
    integration: 集成测试

# 过滤警告
filterwarnings =
    ignore::DeprecationWarning
    ignore::RuntimeWarning